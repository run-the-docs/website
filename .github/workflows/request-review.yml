name: Request Review-E Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]

jobs:
  request-review:
    name: Review-E Review
    runs-on: ubuntu-latest
    if: >-
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'manual-merge')
    permissions:
      pull-requests: write
      contents: write
      issues: write

    steps:
      - name: Generate review-e-bot token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3068795
          private-key: ${{ secrets.REVIEW_E_BOT_PEM }}
          owner: run-the-docs

      - name: Request review and enable auto-merge
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            const number = pr.number;
            console.log(`PR #${number}: ${pr.title} by ${pr.user.login}`);

            // Actually request review via the rig's documented opt-in: the `needs-review`
            // label. Review-E is dispatched by rig-conductor from the assignments:review-e
            // stream once run-the-docs is wired as a conductor tenant (see rig-conductor#1924).
            // (Previously this step only logged a placeholder + armed auto-merge, so no
            // reviewer was ever assigned and PRs sat REVIEW_REQUIRED — fixed here.) Until the
            // tenant dispatch is wired, a labelled PR may still need a manual/admin merge.
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: ['needs-review'],
              });
              console.log('Requested review: applied needs-review label.');
            } catch (e) {
              console.log(`needs-review label: ${e.message}`);
            }

            // Arm squash auto-merge so an approval lands the PR automatically.
            try {
              await github.graphql(`
                mutation {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: "${pr.node_id}",
                    mergeMethod: SQUASH
                  }) { clientMutationId }
                }
              `);
              console.log('Auto-merge enabled (squash).');
            } catch (e) {
              console.log(`Auto-merge: ${e.message}`);
            }

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test example code (React episodes)
        if: hashFiles('**/package.json') != ''
        run: |
          for dir in ep*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Testing $dir..."
              cd "$dir"
              npm install
              npm run build || echo "Build failed for $dir"
              cd ..
            fi
          done
