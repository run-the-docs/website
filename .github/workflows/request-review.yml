name: Request Review-E Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]

jobs:
  request-review:
    name: Review-E Review
    runs-on: ubuntu-latest
    if: >-
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'manual-merge')
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Generate review-e-bot token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3068795
          private-key: ${{ secrets.REVIEW_E_BOT_PEM }}
          owner: run-the-docs

      - name: Request review and enable auto-merge
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            const number = pr.number;

            // Submit a pending review to signal Review-E is assigned
            console.log(`PR #${number}: ${pr.title} by ${pr.user.login}`);
            console.log('Review-E bot will review this PR.');

            // Enable auto-merge (squash)
            try {
              await github.graphql(`
                mutation {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: "${pr.node_id}",
                    mergeMethod: SQUASH
                  }) { clientMutationId }
                }
              `);
              console.log('Auto-merge enabled');
            } catch (e) {
              console.log(`Auto-merge: ${e.message}`);
            }

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test example code (React episodes)
        if: hashFiles('**/package.json') != ''
        run: |
          for dir in ep*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Testing $dir..."
              cd "$dir"
              npm install
              npm run build || echo "Build failed for $dir"
              cd ..
            fi
          done
