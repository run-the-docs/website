<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videos · Run the Docs</title>
  <meta name="description" content="Run the Docs videos, hosted on-site. One concept, from the actual docs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --accent: #326CE5;
      --accent-light: #60a5fa;
      --clay: #da7756;
      --text: #f8fafc;
      --muted: #8b92a5;
      --card-border: rgba(50, 108, 229, 0.3);
      --font: 'JetBrains Mono', monospace;
    }

    html { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    body { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    a { color: var(--accent-light); }

    header { padding: 4rem 0 1rem; text-align: center; }
    .logo { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1; margin-bottom: 1rem; }
    .logo .docs { color: var(--accent); }
    .tagline { font-size: 0.95rem; color: var(--muted); letter-spacing: 0.04em; }
    .nav { margin-top: 1rem; font-size: 0.9rem; }
    .nav a { text-decoration: none; }

    main { padding: 2rem 0 4rem; }
    .series { margin-bottom: 4rem; }
    .series-title { font-size: 1.6rem; font-weight: 700; color: var(--accent); margin-bottom: 0.4rem; }
    .series-title.cc { color: var(--clay); }
    .series-meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.75rem; }

    /* Claude Code 4:5 grid */
    .grid { display: grid; gap: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .clip { border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.02); }
    .clip video { display: block; width: 100%; height: auto; background: #000; }
    .clip-body { padding: 0.85rem 1rem 1.1rem; }
    .clip-ep { font-size: 0.7rem; color: var(--clay); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .clip-title { font-size: 1rem; font-weight: 700; margin: 0.15rem 0 0.45rem; }
    .clip-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    /* The Rig — single feature card (16:9) */
    .video-card { border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; background: rgba(255,255,255,0.02); max-width: 820px; }
    .video-card video { display: block; width: 100%; height: auto; background: #000; }
    .video-body { padding: 1.25rem 1.4rem 1.5rem; }
    .video-badge { display: inline-block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--clay); border: 1px solid rgba(218,119,86,0.4); border-radius: 999px; padding: 2px 10px; margin-bottom: 0.7rem; }
    .video-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    .video-desc { font-size: 0.92rem; color: var(--muted); line-height: 1.55; margin-bottom: 1rem; }
    .video-links { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .video-links a { font-size: 0.82rem; text-decoration: none; color: var(--text); border: 1px solid var(--card-border); border-radius: 8px; padding: 6px 12px; }
    .video-links a:hover { border-color: var(--accent); }

    footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 2rem 0 3rem; }

    /* Share kit (per-card download + per-platform caption + posted status) */
    .share { border-top: 1px solid var(--card-border); margin-top: 0.75rem; padding-top: 0.4rem; }
    .share-toggle { background: none; border: none; color: var(--accent-light); font-family: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; padding: 0.4rem 0; width: 100%; text-align: left; }
    .share-body { display: flex; flex-direction: column; gap: 0.6rem; padding: 0.3rem 0 0.5rem; }
    .share-body.hidden { display: none; }
    .share-note { font-size: 0.68rem; color: var(--muted); }
    .share-soon { font-size: 0.72rem; color: var(--muted); font-style: italic; align-self: center; }
    .share-row { border: 1px solid var(--card-border); border-radius: 8px; padding: 0.55rem 0.6rem; }
    .share-row-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.4rem; }
    .share-plat { font-size: 0.76rem; font-weight: 700; color: var(--text); }
    .share-plat .fmt { color: var(--muted); font-weight: 400; font-size: 0.68rem; margin-left: 0.35rem; }
    .posted-btn { font-size: 0.66rem; font-family: inherit; border-radius: 999px; padding: 2px 9px; cursor: pointer; border: 1px solid var(--card-border); background: transparent; color: var(--muted); white-space: nowrap; }
    .posted-btn.posted { color: var(--accent-light); border-color: var(--accent-light); }
    .share-cap { width: 100%; box-sizing: border-box; background: var(--bg); color: var(--text); border: 1px solid var(--card-border); border-radius: 6px; font-family: inherit; font-size: 0.73rem; line-height: 1.45; padding: 0.5rem; resize: vertical; min-height: 4.5em; }
    .share-actions { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 0.4rem; }
    .share-actions button, .share-actions a { font-size: 0.72rem; font-family: inherit; text-decoration: none; color: var(--text); border: 1px solid var(--card-border); border-radius: 6px; padding: 4px 10px; cursor: pointer; background: transparent; }
    .share-actions button:hover, .share-actions a:hover { border-color: var(--accent); }
  </style>
</head>

<body>

  <header>
    <div class="logo">Run the <span class="docs">Docs</span></div>
    <p class="tagline">One concept. From the actual docs.</p>
    <p class="nav"><a href="index.html">← All series</a> · <a href="brain.html">Brain</a></p>
  </header>

  <main>

    <section class="series">
      <h2 class="series-title cc">claude code</h2>
      <p class="series-meta" id="cc-meta"></p>
      <div class="grid" id="cc-grid"></div>
    </section>

    <section class="series">
      <h2 class="series-title">the rig</h2>
      <p class="series-meta">How Dashecorp's autonomous engineering pipeline reviews code.</p>
      <div id="rig-extras"></div>
    </section>

  </main>

  <footer>Run the Docs · self-hosted on Cloudflare Pages</footer>

  <script>
  // Data-driven /videos: render cards from videos/catalog.json (the catalogue the
  // Phase-4 reconciler regenerates from R2) + decorate with human prose from
  // videos/captions.json. "Present in catalog" => "shown here" with no hand edit.
  // A missing caption never hides a video (its download still renders).
  (function () {
    var PLATFORMS = [
      { key: "youtube",  label: "YouTube",                 fmt: "9:16" },
      { key: "tiktok",   label: "TikTok / Reels / Shorts", fmt: "9:16" },
      { key: "linkedin", label: "LinkedIn",                fmt: "4:5"  },
      { key: "x",        label: "X",                       fmt: "4:5"  }
    ];
    var pkey = function (ep, p) { return "rtd-posted:" + ep + ":" + p; };
    var grid = document.getElementById("cc-grid");
    var rigBox = document.getElementById("rig-extras");

    function el(tag, cls, text) {
      var n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text != null) n.textContent = text;
      return n;
    }

    function videoEl(poster, file) {
      var v = document.createElement("video");
      v.controls = true; v.preload = "metadata"; v.playsInline = true;
      if (poster) v.setAttribute("poster", poster);
      var s = document.createElement("source");
      s.src = file; s.type = "video/mp4";
      v.appendChild(s);
      return v;
    }

    function shareKit(ep, entry, caps) {
      caps = caps || {};
      var share = el("div", "share");
      var toggle = el("button", "share-toggle"); toggle.type = "button"; toggle.textContent = "Share ▾";
      var body = el("div", "share-body hidden");
      toggle.addEventListener("click", function () {
        var hidden = body.classList.toggle("hidden");
        toggle.textContent = hidden ? "Share ▾" : "Share ▴";
      });
      body.appendChild(el("p", "share-note", "Vertical downloads (YouTube / TikTok) are the 9:16 cut from R2; feed downloads (LinkedIn / X) are the 4:5 clip. A few of the newest episodes' 9:16 cuts are still uploading."));

      PLATFORMS.forEach(function (plat) {
        var caption = caps[plat.key];
        var row = el("div", "share-row");
        var head = el("div", "share-row-head");
        var name = el("span", "share-plat", plat.label);
        name.appendChild(el("span", "fmt", plat.fmt));
        var posted = el("button", "posted-btn"); posted.type = "button";
        var setPostedLabel = function () {
          var on = localStorage.getItem(pkey(ep, plat.key)) === "1";
          posted.classList.toggle("posted", on);
          posted.textContent = on ? "Posted ✓" : "Not posted";
        };
        posted.addEventListener("click", function () {
          var on = localStorage.getItem(pkey(ep, plat.key)) === "1";
          localStorage.setItem(pkey(ep, plat.key), on ? "0" : "1");
          setPostedLabel();
        });
        setPostedLabel();
        head.appendChild(name); head.appendChild(posted);

        var ta = el("textarea", "share-cap"); ta.readOnly = true; ta.rows = 4;
        if (typeof caption === "string") { ta.value = caption; }
        else { ta.placeholder = "(caption coming soon)"; }

        var actions = el("div", "share-actions");
        var copy = el("button", null, "Copy caption"); copy.type = "button";
        copy.addEventListener("click", function () {
          if (!ta.value) return;
          var done = function () { copy.textContent = "Copied ✓"; setTimeout(function () { copy.textContent = "Copy caption"; }, 1500); };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(ta.value).then(done, function () { ta.select(); done(); });
          } else { ta.select(); try { document.execCommand("copy"); } catch (e) {} done(); }
        });
        actions.appendChild(copy);

        if (plat.fmt === "9:16") {
          if (entry.v916) {
            var dl = document.createElement("a");
            dl.href = entry.v916; dl.target = "_blank"; dl.rel = "noopener";
            dl.setAttribute("download", ""); dl.textContent = "Download 9:16";
            actions.appendChild(dl);
          } else {
            actions.appendChild(el("span", "share-soon", "9:16 uploading soon"));
          }
        } else {
          var dl45 = document.createElement("a");
          dl45.href = entry.file; dl45.setAttribute("download", ""); dl45.textContent = "Download 4:5";
          actions.appendChild(dl45);
        }
        row.appendChild(head); row.appendChild(ta); row.appendChild(actions);
        body.appendChild(row);
      });
      share.appendChild(toggle); share.appendChild(body);
      return share;
    }

    function episodeCard(ep, captions) {
      var card = el("div", "clip");
      card.appendChild(videoEl(ep.poster, ep.file));
      var b = el("div", "clip-body");
      b.appendChild(el("span", "clip-ep", ep.ep));
      var title = el("div", "clip-title"); title.textContent = ep.title; b.appendChild(title);
      var desc = el("p", "clip-desc"); desc.innerHTML = ep.desc; b.appendChild(desc); // trusted catalog HTML (<code>)
      b.appendChild(shareKit(ep.ep, ep, captions ? captions[ep.ep] : null));
      card.appendChild(b);
      return card;
    }

    function rigCard(x) {
      var card = el("div", "video-card");
      var v = videoEl(x.poster, x.file);
      v.appendChild(document.createTextNode("Your browser doesn't support embedded video — "));
      var fb = document.createElement("a"); fb.href = x.file; fb.textContent = "download the clip"; v.appendChild(fb);
      card.appendChild(v);
      var body = el("div", "video-body");
      if (x.badge) body.appendChild(el("span", "video-badge", x.badge));
      var t = el("div", "video-title"); t.textContent = x.title; body.appendChild(t);
      var d = el("p", "video-desc"); d.innerHTML = x.desc; body.appendChild(d);
      if (x.links && x.links.length) {
        var links = el("div", "video-links");
        x.links.forEach(function (l) {
          var a = document.createElement("a"); a.href = l.href; a.target = "_blank"; a.rel = "noopener";
          a.textContent = l.label; links.appendChild(a);
        });
        body.appendChild(links);
      }
      card.appendChild(body);
      return card;
    }

    Promise.all([
      fetch("videos/catalog.json", { cache: "no-cache" }).then(function (r) { return r.ok ? r.json() : null; }),
      fetch("videos/captions.json", { cache: "no-cache" }).then(function (r) { return r.ok ? r.json() : {}; })
    ]).then(function (res) {
      var catalog = res[0], captions = res[1] || {};
      if (!catalog || !catalog.claude_code) { if (grid) grid.textContent = "Catalog unavailable."; return; }
      var cc = catalog.claude_code;
      var meta = document.getElementById("cc-meta");
      if (meta) meta.textContent = cc.meta || "";
      (cc.episodes || []).forEach(function (ep) { grid.appendChild(episodeCard(ep, captions)); });
      (catalog.extras || []).forEach(function (x) { rigBox.appendChild(rigCard(x)); });
    }).catch(function () { if (grid) grid.textContent = "Catalog failed to load."; });
  })();
  </script>

</body>
</html>
